<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="rckpprscr.css">
    <title>Document</title>
</head>

<body>
    <h1>Rock paper scissor</h1>
    <div class="choices">
        <div class="choice" id="rock"><img src="imgs/rock.png" alt=""></div>
        <div class="choice" id="paper"><img src="imgs/paper.png" alt=""></div>
        <div class="choice" id="scissors"><img src="imgs/scissors.png" alt=""></div>
    </div>  
    <div class="scoreboard">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <script src="rckpprscr.js">
    </script>
</body>

</html>

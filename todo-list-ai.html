<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  h1 {
    text-align: center;
    color: #333;
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 24px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  #taskInput {
    flex: 1;
    padding: 10px 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  #taskInput:focus {
    border-color: #764ba2;
  }

  #addBtn {
    background: #764ba2;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #addBtn:hover {
    background: #5f3a85;
  }

  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .filter-btn {
    flex: 1;
    padding: 6px;
    border: none;
    background: #f0f0f0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #555;
    transition: background 0.2s, color 0.2s;
  }

  .filter-btn.active {
    background: #764ba2;
    color: #fff;
  }

  #taskList {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 320px;
    overflow-y: auto;
  }

  #taskList li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-bottom: 1px solid #eee;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #taskList li .task-text {
    flex: 1;
    word-break: break-word;
    color: #333;
    font-size: 15px;
  }

  #taskList li.completed .task-text {
    text-decoration: line-through;
    color: #aaa;
  }

  #taskList li input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #764ba2;
    flex-shrink: 0;
  }

  .delete-btn {
    background: none;
    border: none;
    color: #e74c3c;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    flex-shrink: 0;
  }

  .delete-btn:hover {
    color: #c0392b;
  }

  .empty-msg {
    text-align: center;
    color: #999;
    padding: 20px 0;
    font-size: 14px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    font-size: 13px;
    color: #888;
  }

  #clearCompleted {
    background: none;
    border: none;
    color: #764ba2;
    cursor: pointer;
    font-size: 13px;
    text-decoration: underline;
  }

  #clearCompleted:hover {
    color: #5f3a85;
  }
</style>
</head>
<body>

<div class="container">
  <h1>📝 My To-Do List</h1>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="200">
    <button id="addBtn">Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <ul id="taskList"></ul>

  <div class="footer">
    <span id="itemsLeft">0 items left</span>
    <button id="clearCompleted">Clear completed</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'todoTasks';

  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const taskList = document.getElementById('taskList');
  const itemsLeft = document.getElementById('itemsLeft');
  const clearCompletedBtn = document.getElementById('clearCompleted');
  const filterBtns = document.querySelectorAll('.filter-btn');

  let tasks = [];
  let currentFilter = 'all';

  function loadTasks() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      tasks = stored ? JSON.parse(stored) : [];
    } catch (e) {
      tasks = [];
    }
  }

  function saveTasks() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      // localStorage unavailable, fail silently
    }
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function addTask(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    tasks.push({ id: generateId(), text: trimmed, completed: false });
    saveTasks();
    render();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) task.completed = !task.completed;
    saveTasks();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    render();
  }

  function getFilteredTasks() {
    if (currentFilter === 'active') return tasks.filter(t => !t.completed);
    if (currentFilter === 'completed') return tasks.filter(t => t.completed);
    return tasks;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function render() {
    const filtered = getFilteredTasks();
    taskList.innerHTML = '';

    if (filtered.length === 0) {
      const emptyMsg = document.createElement('li');
      emptyMsg.className = 'empty-msg';
      emptyMsg.textContent = tasks.length === 0
        ? 'No tasks yet. Add one above!'
        : 'No tasks match this filter.';
      taskList.appendChild(emptyMsg);
    } else {
      filtered.forEach(task => {
        const li = document.createElement('li');
        li.className = task.completed ? 'completed' : '';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.completed;
        checkbox.addEventListener('change', () => toggleTask(task.id));

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '&times;';
        delBtn.setAttribute('aria-label', 'Delete task');
        delBtn.addEventListener('click', () => deleteTask(task.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        taskList.appendChild(li);
      });
    }

    const remaining = tasks.filter(t => !t.completed).length;
    itemsLeft.textContent = `${remaining} item${remaining !== 1 ? 's' : ''} left`;
  }

  addBtn.addEventListener('click', () => {
    addTask(taskInput.value);
    taskInput.value = '';
    taskInput.focus();
  });

  taskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addTask(taskInput.value);
      taskInput.value = '';
    }
  });

  clearCompletedBtn.addEventListener('click', clearCompleted);

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  loadTasks();
  render();
})();
</script>

</body>
</html>
